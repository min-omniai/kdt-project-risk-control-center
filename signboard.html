<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>플밍반 마일스톤 전광판</title>
    <style>
      :root {
        color: #f7fbff;
        background: #070b10;
        font-family: Pretendard, "Noto Sans KR", Inter, system-ui, sans-serif;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: #070b10;
      }

      .stadium {
        position: relative;
        display: grid;
        align-items: start;
        justify-items: center;
        min-height: 100vh;
        overflow: hidden;
        padding: clamp(18px, 4vw, 48px) 18px;
        background:
          linear-gradient(180deg, rgba(2, 6, 12, .32), rgba(2, 6, 12, .1) 36%, rgba(2, 6, 12, .38)),
          url("./assets/stadium-scoreboard-bg.png") center top / cover no-repeat;
      }

      .stadium::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(0, 0, 0, .22), transparent 22%, transparent 78%, rgba(0, 0, 0, .24));
        pointer-events: none;
      }

      .scoreboard-rig {
        position: relative;
        z-index: 1;
        width: min(980px, 92vw);
        margin-top: clamp(10px, 3vh, 34px);
        filter: drop-shadow(0 24px 36px rgba(0, 0, 0, .54));
      }

      .scoreboard-rig::before {
        content: "";
        position: absolute;
        left: 7%;
        right: 7%;
        bottom: -16px;
        height: 16px;
        border-radius: 0 0 5px 5px;
        background: linear-gradient(180deg, #48515a, #252b32);
      }

      .scoreboard {
        position: relative;
        display: grid;
        grid-template-columns: .78fr 1.3fr;
        min-height: 330px;
        overflow: hidden;
        padding: 18px;
        border: 10px solid #252c33;
        border-radius: 8px 8px 4px 4px;
        background: #05080c;
        clip-path: polygon(4% 0, 96% 0, 100% 12%, 100% 100%, 0 100%, 0 12%);
      }

      .scoreboard::before {
        content: "DAEJEON WORLD CUP STADIUM";
        position: absolute;
        top: 4px;
        left: 50%;
        transform: translateX(-50%);
        padding: 3px 18px;
        border-radius: 0 0 8px 8px;
        color: #9ec9dc;
        background: #1d627b;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: .1em;
      }

      .score-panel {
        display: grid;
        grid-template-rows: auto auto 1fr auto;
        gap: 12px;
        padding: 30px 22px 20px;
        border-right: 1px solid rgba(255, 255, 255, .13);
        background: radial-gradient(circle at 50% 48%, rgba(23, 132, 62, .35), transparent 26%), #090c10;
      }

      .clock {
        color: #f7f06a;
        font-size: clamp(27px, 4vw, 44px);
        font-weight: 900;
        line-height: 1;
        text-align: center;
        text-shadow: 0 0 10px rgba(247, 240, 106, .48);
      }

      .match {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 10px;
        align-items: end;
      }

      .team {
        display: grid;
        gap: 6px;
        color: #ffffff;
        font-size: clamp(14px, 2vw, 24px);
        font-weight: 900;
        text-align: center;
      }

      .team strong {
        color: #f7f06a;
        font-size: clamp(32px, 4.8vw, 54px);
        line-height: .9;
        text-shadow: 0 0 12px rgba(247, 240, 106, .42);
      }

      .period {
        align-self: center;
        color: #ff5151;
        font-size: clamp(16px, 2.4vw, 30px);
        font-weight: 900;
      }

      .crest {
        display: grid;
        place-items: center;
        color: #18a64f;
        font-size: clamp(50px, 8vw, 88px);
        font-weight: 900;
        line-height: 1;
        text-shadow: 0 0 24px rgba(24, 166, 79, .5);
      }

      .deadline {
        color: #6cff88;
        font-size: clamp(26px, 4vw, 48px);
        font-weight: 900;
        line-height: 1;
        text-align: center;
        text-shadow: 0 0 14px rgba(108, 255, 136, .45);
      }

      .notice-panel {
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 14px;
        padding: 30px 28px 22px;
        background:
          linear-gradient(90deg, rgba(0, 0, 0, .72), rgba(0, 0, 0, .28)),
          radial-gradient(circle at 76% 18%, rgba(90, 172, 255, .22), transparent 28%),
          #0b0e12;
      }

      .memorial {
        justify-self: end;
        display: grid;
        gap: 3px;
        color: #eef4fb;
        text-align: right;
      }

      .memorial b {
        font-size: clamp(15px, 2vw, 24px);
      }

      .memorial small {
        color: #c7d0da;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: .04em;
      }

      .headline {
        max-width: 580px;
        margin: 0;
        color: #ffffff;
        font-size: clamp(25px, 4.2vw, 54px);
        font-weight: 900;
        line-height: 1.16;
        text-shadow: 0 4px 14px rgba(0, 0, 0, .78);
      }

      .focus-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        align-self: end;
      }

      .focus-list article {
        min-height: 76px;
        padding: 12px 14px;
        border: 1px solid rgba(255, 255, 255, .18);
        border-radius: 4px;
        background: rgba(5, 8, 12, .74);
      }

      .focus-list span {
        display: block;
        margin-bottom: 5px;
        color: #7fd4ff;
        font-size: 11px;
        font-weight: 900;
      }

      .focus-list strong {
        display: block;
        color: #fff;
        font-size: clamp(15px, 1.8vw, 22px);
        line-height: 1.2;
      }

      .caption {
        position: relative;
        z-index: 1;
        margin-top: 18px;
        padding: 8px 14px;
        border-radius: 999px;
        color: rgba(255, 255, 255, .86);
        background: rgba(0, 0, 0, .54);
        font-size: 13px;
        font-weight: 800;
        backdrop-filter: blur(8px);
      }

      @media (max-width: 760px) {
        .stadium { align-items: center; padding: 16px 10px; }
        .scoreboard-rig { width: min(560px, 94vw); }
        .scoreboard {
          grid-template-columns: 1fr;
          min-height: 0;
          padding: 12px;
          border-width: 7px;
        }
        .score-panel {
          grid-template-columns: auto 1fr auto;
          grid-template-rows: auto auto;
          align-items: center;
          padding: 24px 14px 14px;
          border-right: 0;
          border-bottom: 1px solid rgba(255, 255, 255, .13);
        }
        .clock { grid-column: 1 / -1; font-size: 28px; }
        .match { grid-column: 1 / 3; }
        .crest { display: none; }
        .deadline { font-size: 27px; }
        .notice-panel { padding: 18px 14px 16px; }
        .memorial { justify-self: start; text-align: left; }
        .headline { font-size: 28px; }
        .focus-list { grid-template-columns: 1fr; }
        .caption { max-width: 92vw; text-align: center; }
      }
    </style>
  </head>
  <body>
    <main class="stadium">
      <section class="scoreboard-rig" aria-label="플밍반 축구 전광판">
        <div class="scoreboard">
          <aside class="score-panel">
            <div class="clock">20:07</div>
            <div class="match" aria-label="마일스톤 스코어">
              <div class="team">
                <span>BUILD</span>
                <strong>0</strong>
              </div>
              <div class="period">CBT</div>
              <div class="team">
                <span>BUG</span>
                <strong>0</strong>
              </div>
            </div>
            <div class="crest" aria-hidden="true">◆</div>
            <div class="deadline">D-6</div>
          </aside>

          <section class="notice-panel">
            <div class="memorial">
              <b>CBT 집중 기간</b>
              <small>2026.06.30 FINAL</small>
            </div>
            <p class="headline">우리는 플레이 가능한 빌드로 증명합니다.</p>
            <div class="focus-list" aria-label="전 팀 집중 항목">
              <article>
                <span>01</span>
                <strong>오늘 빌드 확인</strong>
              </article>
              <article>
                <span>02</span>
                <strong>완료 기준 잠금</strong>
              </article>
              <article>
                <span>03</span>
                <strong>일정 복구표 갱신</strong>
              </article>
              <article>
                <span>04</span>
                <strong>체크인 작성</strong>
              </article>
            </div>
          </section>
        </div>
      </section>
      <div class="caption">플밍반 공통 공지 · 팀별 리스크와 개인 정보는 표시하지 않습니다.</div>
    </main>
  </body>
</html>
